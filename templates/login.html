{% extends 'base.html' %}

{% block title %}Sign in | MyApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-5 col-lg-6 col-md-8">
        <div class="card page-card p-5">
            <div class="section-title text-center mb-4">
                <h1>Sign in to your account</h1>
                <p>Enter your credentials to continue.</p>
            </div>
            <form id="loginForm" action="/myapp/login_post/" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                    <small class="text-danger d-none" id="emailError">Please enter a valid email address</small>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    <small class="text-danger d-none" id="passwordError">Password is required</small>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign in</button>
                <a href="/myapp/forgot_password/" class="d-block text-center mt-3">Forgot your password?</a>
            </form>
            <div class="text-center mt-4">
                <span class="text-muted">New here?</span>
                <a href="/myapp/signup/" class="link-soft">Create an account</a>
            </div>
        </div>
    </div>
</div>

<script>
function validateLoginForm(event) {
    event.preventDefault();
    let isValid = true;

    // Validate email
    const email = document.getElementById('email').value.trim();
    const emailError = document.getElementById('emailError');
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        emailError.classList.remove('d-none');
        isValid = false;
    } else {
        emailError.classList.add('d-none');
    }

    // Validate password
    const password = document.getElementById('password').value;
    const passwordError = document.getElementById('passwordError');
    if (password.trim().length === 0) {
        passwordError.classList.remove('d-none');
        isValid = false;
    } else {
        passwordError.classList.add('d-none');
    }

    if (isValid) {
        document.getElementById('loginForm').submit();
    }
}

document.getElementById('loginForm').addEventListener('submit', validateLoginForm);
</script>
{% endblock %}
