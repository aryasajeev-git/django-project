{% extends 'base.html' %}

{% block title %}Change Password | MyApp{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-xl-5 col-lg-6 col-md-8">
    <div class="page-card p-5">
      <div class="section-title text-center mb-4">
        <h1>Change Password</h1>
        <p class="text-muted mb-0">Enter your new secure password.</p>
      </div>
      <form id="resetPasswordForm" action="/myapp/reset_password_post/" method="post">
        {% csrf_token %}
        <div class="mb-4">
          <label for="newPassword" class="form-label">New password</label>
          <input type="password" class="form-control" id="newPassword" name="new_password" placeholder="Enter new password" required>
          <small class="text-danger d-none" id="newPasswordError">Password must be at least 8 characters with uppercase, lowercase, and a number</small>
          <div id="passwordStrength" class="mt-2"></div>
        </div>
        <div class="mb-4">
          <label for="confirmPassword" class="form-label">Confirm password</label>
          <input type="password" class="form-control" id="confirmPassword" name="confirm_password" placeholder="Confirm new password" required>
          <small class="text-danger d-none" id="confirmPasswordError">Passwords do not match</small>
        </div>
        <button type="submit" class="btn btn-primary w-100">Update password</button>
      </form>
      <div class="text-center mt-4">
        <a href="/myapp/login/" class="link-soft">Back to login</a>
      </div>
    </div>
  </div>
</div>

<script>
function validateResetPasswordForm(event) {
    event.preventDefault();
    let isValid = true;

    // Validate new password
    const newPassword = document.getElementById('newPassword').value;
    const newPasswordError = document.getElementById('newPasswordError');
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
    if (!passwordRegex.test(newPassword)) {
        newPasswordError.classList.remove('d-none');
        isValid = false;
    } else {
        newPasswordError.classList.add('d-none');
    }

    // Validate confirm password matches
    const confirmPassword = document.getElementById('confirmPassword').value;
    const confirmPasswordError = document.getElementById('confirmPasswordError');
    if (newPassword !== confirmPassword) {
        confirmPasswordError.classList.remove('d-none');
        isValid = false;
    } else {
        confirmPasswordError.classList.add('d-none');
    }

    if (isValid) {
        document.getElementById('resetPasswordForm').submit();
    }
}

// Check password strength in real-time
document.getElementById('newPassword').addEventListener('input', function() {
    const password = this.value;
    const strengthDiv = document.getElementById('passwordStrength');
    let strength = 0;
    let strengthText = '';
    let strengthColor = '';

    if (password.length >= 8) strength++;
    if (password.length >= 12) strength++;
    if (/[a-z]/.test(password)) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/\d/.test(password)) strength++;
    if (/[^a-zA-Z0-9]/.test(password)) strength++;

    if (strength < 3) {
        strengthText = 'Weak';
        strengthColor = '#dc3545';
    } else if (strength < 5) {
        strengthText = 'Fair';
        strengthColor = '#ffc107';
    } else {
        strengthText = 'Strong';
        strengthColor = '#28a745';
    }

    strengthDiv.innerHTML = `<small style="color: ${strengthColor};">Password Strength: ${strengthText}</small>`;
});

document.getElementById('resetPasswordForm').addEventListener('submit', validateResetPasswordForm);
</script>
{% endblock %}
