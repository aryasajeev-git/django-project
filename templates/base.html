<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --surface: rgba(255, 255, 255, 0.94);
            --primary: #4f46e5;
            --accent: #14b8a6;
            --text: #111827;
            --muted: #64748b;
        }
        * {
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #eef2ff 0%, #f8fafc 45%, #ffffff 100%);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        .site-header {
            padding: 1.25rem 0;
        }
        .site-brand {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        .site-subtitle {
            color: var(--muted);
            margin-top: 0.5rem;
        }
        .page-card {
            border: 0;
            border-radius: 1.5rem;
            box-shadow: 0 26px 70px rgba(15, 23, 42, 0.08);
            background: var(--surface);
        }
        .btn-primary {
            background: var(--primary);
            border: none;
            border-radius: 1rem;
            padding: 0.95rem 1.25rem;
        }
        .btn-primary:hover,
        .btn-primary:focus {
            background: #4338ca;
        }
        .btn-accent {
            background: var(--accent);
            border: none;
            border-radius: 1rem;
            padding: 0.95rem 1.25rem;
            color: white;
        }
        .btn-accent:hover,
        .btn-accent:focus {
            background: #0f766e;
        }
        .form-control,
        .form-select {
            border-radius: 1rem;
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0.95rem 1rem;
            background: #ffffff;
        }
        .form-label {
            font-weight: 600;
            color: #334155;
        }
        .form-text {
            color: var(--muted);
        }
        .section-title h1,
        .section-title h2 {
            margin-bottom: 0.25rem;
        }
        .section-title p {
            color: var(--muted);
        }
        .link-soft {
            color: var(--primary);
            text-decoration: none;
        }
        .link-soft:hover {
            text-decoration: underline;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 9999px;
            border: 4px solid rgba(79, 70, 229, 0.18);
        }
        .detail-label {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.01em;
            margin-bottom: 0.25rem;
            display: block;
        }
        .detail-value {
            color: var(--text);
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .soft-panel {
            background: rgba(248, 250, 252, 0.9);
            border-radius: 1rem;
            padding: 1.1rem 1.2rem;
        }
        footer {
            margin-top: 2.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.92rem;
        }
    </style>
</head>
<body>
    <div class="container page-shell py-5">
        <header class="site-header d-flex flex-column flex-md-row align-items-start align-items-md-center justify-content-between">
            <a href="/myapp/homepage/" class="site-brand">MyApp</a>
            <div class="site-subtitle">Clean, modern user pages for your app.</div>
        </header>
        <main>{% block content %}{% endblock %}</main>
        <footer>Designed for a more attractive and simple experience.</footer>
    </div>
</body>
</html>
